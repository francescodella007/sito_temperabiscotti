<!doctype html>
<html lang="it">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>Tempera Biscotti - Modalità di Gioco</title>
    <link rel="icon" href="img/favicon.png">
    
    <link rel="stylesheet" href="css/bootstrap.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
</head>
<body>

    <div class="space-mirror-bg">
        <div class="space-panel"></div>
        <div class="space-panel flipped"></div>
        <div class="space-panel"></div>
        <div class="space-panel flipped"></div>
    </div>

    <audio id="bgMusic" loop>
        <source src="sound/Max Gazzè - Sotto Casa (fixed frame video)_128k.mp3" type="audio/mpeg">
    </audio>

    <div class="audio-controls">
        <button id="restartAudioBtn" class="audio-btn icon-only" onclick="restartAudio()" title="Ricomincia da capo">🔄</button>
        <button id="audioToggleBtn" class="audio-btn" onclick="toggleAudio()">🔇 MUSIC: OFF</button>
    </div>

    <header class="main_menu">
        <div class="container-fluid px-5">
            <nav class="navbar navbar-expand-lg navbar-dark p-0 w-100">
                <a href="index.html" class="brand-home" title="Torna alla Home">
                    <img src="img/logo.png" alt="Tempera Biscotti Logo Home">
                </a>
                
                <div class="collapse navbar-collapse justify-content-center">
                    <ul class="navbar-nav">
                        <li class="nav-item"><a class="nav-link" href="modalita.html" style="color: #ffd700 !important;">Modalità</a></li>
                        <li class="nav-item"><a class="nav-link" href="armadietto.html">Armadietto</a></li>
                        <li class="nav-item"><a class="nav-link" href="team.html">Team</a></li>
                    </ul>
                </div>

                <div style="width: 250px;" class="d-none d-lg-block"></div>
                <div class="d-none d-lg-flex justify-content-end align-items-center text-end" style="width: 250px;">
                    <a href="#" class="btn-download-navbar" onclick="event.preventDefault();">
                        <span>🎮</span> DOWNLOAD
                    </a>
                </div>
            </nav>
        </div>
    </header>

    <main class="modes-section container">
        <h1 class="mode-title-page">SELEZIONA MODALITÀ</h1>
        
        <div class="row">
            <div class="col-lg-3 col-md-6">
                <div class="mode-card" onclick="openMode('TIMED', 'Resisti alla pressione! Hai solo 180 secondi per totalizzare il punteggio massimo raccogliendo briciole stellari prima che il forno si chiuda.', 'img/videoplayback.mp4')">
                    <img src="img/Animazione_dnsmultipli.gif" alt="">
                    <h2>TIMED</h2>
                </div>
            </div>
            <div class="col-lg-3 col-md-6">
                <div class="mode-card" onclick="openMode('WAVES', 'Sopravvivi a ondate infinite di alieni pasticceri. Ogni ondata è più veloce e agguerrita della precedente.', 'video/waves.mp4')">
                    <img src="img/navicella.png" alt="">
                    <h2>WAVES</h2>
                </div>
            </div>
            <div class="col-lg-3 col-md-6">
                <div class="mode-card" onclick="openMode('ENDLESS', 'Nessun limite di tempo, nessuna pietà. La sfida definitiva per chi vuole scalare la classifica galattica globale.', 'video/endless.mp4')">
                    <img src="img/navicella.png" alt="">
                    <h2>ENDLESS</h2>
                </div>
            </div>
            <div class="col-lg-3 col-md-6">
                <div class="mode-card" onclick="openMode('SPACE INVADERS', 'Last Stand è una modalità frenetica ispirata ai classici Space Invaders, dove la tua unica speranza è resistere il più a lungo possibile. Controlla la tua navicella muovendoti orizzontalmente e spara verso l\'alto per eliminare i nemici che scendono dall\'alto in ondate sempre più numerose e veloci. Hai 10 vite — usale bene. Obiettivo: sopravvivi il più a lungo possibile e resisti all\'invasione!', 'video/boss.mp4')">
                    <img src="img/navicella.png" alt="">
                    <h2>SPACE INVADERS</h2>
                </div>
            </div>
        </div>
    </main>

    <div id="modalOverlay" class="modal-overlay" onclick="closeMode()">
        <div class="modal-window" onclick="event.stopPropagation()">
            <span class="close-modal" onclick="closeMode()">&times;</span>
            
            <h3 id="modalTitle" class="modal-title">TITOLO MODALITÀ</h3>
            
            <div class="modal-video-container">
                <video id="modalVideo" controls loop muted playsinline>
                    Il tuo browser non supporta il tag video.
                </video>
            </div>
            
            <p id="modalDesc" class="modal-description"></p>
        </div>
    </div>

    <script>
        /* --- GESTIONE AUDIO GLOBALE --- */
        var bgMusic = document.getElementById("bgMusic");
        var audioBtn = document.getElementById("audioToggleBtn");
        var isPlaying = false;

        function toggleAudio() {
            if (isPlaying) {
                bgMusic.pause();
                audioBtn.innerHTML = "🔇 MUSIC: OFF";
                audioBtn.classList.remove("playing");
                sessionStorage.setItem("musicState", "paused");
                sessionStorage.setItem("musicTime", bgMusic.currentTime); 
            } else {
                bgMusic.play();
                audioBtn.innerHTML = "🔊 MUSIC: ON";
                audioBtn.classList.add("playing");
                sessionStorage.setItem("musicState", "playing");
            }
            isPlaying = !isPlaying;
        }

        function restartAudio() {
            bgMusic.currentTime = 0; 
            sessionStorage.setItem("musicTime", "0");
            if (!isPlaying) {
                toggleAudio(); 
            }
        }

        window.addEventListener('DOMContentLoaded', (event) => {
            var savedState = sessionStorage.getItem("musicState");
            var savedTime = sessionStorage.getItem("musicTime");

            if (savedTime !== null) {
                bgMusic.currentTime = parseFloat(savedTime);
            }

            if (savedState === "playing") {
                bgMusic.play().then(() => {
                    isPlaying = true;
                    audioBtn.innerHTML = "🔊 MUSIC: ON";
                    audioBtn.classList.add("playing");
                }).catch((error) => {
                    console.log("Autoplay bloccato. È necessario un clic dell'utente.");
                    isPlaying = false;
                    sessionStorage.setItem("musicState", "paused");
                });
            }
        });

        window.addEventListener("beforeunload", function() {
            sessionStorage.setItem("musicTime", bgMusic.currentTime);
        });

        /* --- GESTIONE FINESTRA MODALE --- */
        function openMode(title, desc, videoSrc) {
            document.getElementById('modalTitle').innerText = title;
            document.getElementById('modalDesc').innerText = desc;
            
            var videoElement = document.getElementById('modalVideo');
            videoElement.src = videoSrc;
            videoElement.play();

            document.getElementById('modalOverlay').style.display = 'flex';
        }

        function closeMode() {
            var videoElement = document.getElementById('modalVideo');
            videoElement.pause();
            videoElement.src = "";

            document.getElementById('modalOverlay').style.display = 'none';
        }
    </script>
</body>
</html>
